<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Quizzery</title>
  <link rel="stylesheet" href="/css/shared.css" />
</head>
<body>

<div class="auth-overlay">
  <div class="auth-box">
    <h2>Quizzery</h2>
    <p class="auth-tagline">Reset your password</p>

    <div class="auth-form" id="resetForm">
      <div class="pw-wrap">
        <input type="password" id="newPassword" placeholder="New password (6+ characters)" autocomplete="new-password" />
        <button type="button" class="btn-eye" data-target="newPassword">Show</button>
      </div>
      <div class="pw-wrap">
        <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" />
        <button type="button" class="btn-eye" data-target="confirmPassword">Show</button>
      </div>
      <button class="btn-primary" id="resetBtn">Reset Password</button>
    </div>

    <p class="auth-error" id="resetError"></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    document.getElementById('resetError').textContent = 'Invalid reset link. Please request a new one.';
    document.getElementById('resetForm').style.display = 'none';
  }

  function setError(msg, isSuccess) {
    const el = document.getElementById('resetError');
    el.textContent = msg;
    el.style.color = isSuccess ? 'var(--primary)' : '';
  }

  document.querySelectorAll('.btn-eye').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    });
  });

  async function handleReset() {
    const password = document.getElementById('newPassword').value;
    const confirm  = document.getElementById('confirmPassword').value;

    if (!password) { setError('Please enter a new password.'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters.'); return; }
    if (password !== confirm) { setError('Passwords do not match.'); return; }

    setError('');
    document.getElementById('resetBtn').disabled = true;

    try {
      await api('POST', '/auth/reset-password', { token, password });
      setError('Password reset! Redirecting to login...', true);
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    } catch (err) {
      setError(err.message);
      document.getElementById('resetBtn').disabled = false;
    }
  }

  document.getElementById('resetBtn').addEventListener('click', handleReset);
  document.getElementById('newPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('confirmPassword').focus();
  });
  document.getElementById('confirmPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleReset();
  });
</script>
</body>
</html>
