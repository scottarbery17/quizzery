<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzery</title>
  <link rel="stylesheet" href="/css/shared.css" />
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>Quizzery</h2>
    <p class="auth-tagline">Bible Verse Memorization</p>

    <div class="auth-form" id="loginForm">
      <input type="text" id="loginUsername" placeholder="Username" autocomplete="username" />
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
      <button class="btn-primary" id="loginBtn">Log In</button>
      <p class="auth-switch">No account? <a id="showSignup">Sign up</a></p>
    </div>

    <div class="auth-form" id="signupForm" style="display:none">
      <input type="text" id="signupUsername" placeholder="Choose a username" autocomplete="username" />
      <input type="password" id="signupPassword" placeholder="Choose a password (6+ chars)" autocomplete="new-password" />
      <button class="btn-primary" id="signupBtn">Create Account</button>
      <p class="auth-switch">Already have an account? <a id="showLogin">Log in</a></p>
    </div>

    <p class="auth-error" id="authError"></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // If already logged in, go straight to memorize
  if (getToken()) {
    window.location.href = '/memorize';
  }

  function setAuthError(msg) { document.getElementById('authError').textContent = msg; }

  async function handleAuth(type) {
    const usernameEl = document.getElementById(type === 'login' ? 'loginUsername' : 'signupUsername');
    const passwordEl = document.getElementById(type === 'login' ? 'loginPassword' : 'signupPassword');
    const username = usernameEl.value.trim();
    const password = passwordEl.value;
    if (!username || !password) { setAuthError('Please enter a username and password.'); return; }
    setAuthError('');
    try {
      const data = await api('POST', `/auth/${type}`, { username, password });
      if (!data) return;
      setAuth(data.token, data.username);
      window.location.href = '/memorize';
    } catch (err) {
      setAuthError(err.message);
    }
  }

  document.getElementById('loginBtn').addEventListener('click', () => handleAuth('login'));
  document.getElementById('signupBtn').addEventListener('click', () => handleAuth('signup'));

  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuth('login');
  });
  document.getElementById('signupPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuth('signup');
  });
  document.getElementById('loginUsername').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPassword').focus();
  });
  document.getElementById('signupUsername').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('signupPassword').focus();
  });

  document.getElementById('showSignup').addEventListener('click', e => {
    e.preventDefault();
    setAuthError('');
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'flex';
    document.getElementById('signupUsername').focus();
  });

  document.getElementById('showLogin').addEventListener('click', e => {
    e.preventDefault();
    setAuthError('');
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'flex';
    document.getElementById('loginUsername').focus();
  });
</script>
</body>
</html>
